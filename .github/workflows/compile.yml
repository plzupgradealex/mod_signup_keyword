# Compiles mod_signup_keyword.erl on every push and PR.
#
# The module's only includes are ejabberd's own headers (logger.hrl,
# translate.hrl) and the xmpp library headers (xmpp.hrl, xmpp_codec.hrl —
# which define the #register, #xdata, #iq records the module uses). We don't
# need a full ejabberd build for that; we just need the header trees from
# ejabberd + the xmpp dep. That's a fast, reliable clone.
#
# What we're verifying: that the module compiles with no errors against the
# real ejabberd 26.04 source. The "behaviour gen_mod undefined" warning is
# expected (gen_mod.beam isn't on the compile-time code path; it resolves
# at load time inside a running ejabberd) and is filtered out below.
name: compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"

      - name: Fetch ejabberd + xmpp headers
        run: |
          # ejabberd itself: we need include/ (logger.hrl, translate.hrl, etc.)
          git clone --depth 1 --branch 26.04 https://github.com/processone/ejabberd.git
          # The xmpp library (a separate repo: p1_xmpp): we need its include/
          # which has xmpp.hrl and xmpp_codec.hrl (the #register/#xdata/#iq
          # records). Place it where -I ejabberd/_build/default/lib finds it,
          # mirroring the built-tree layout the module's -include_lib expects.
          mkdir -p ejabberd/_build/default/lib
          git clone --depth 1 https://github.com/processone/xmpp.git \
            ejabberd/_build/default/lib/xmpp
          # xmpp.hrl includes fast_xml/include/fxml.hrl — fetch it.
          git clone --depth 1 https://github.com/processone/fast_xml.git \
            ejabberd/_build/default/lib/fast_xml
          # p1_xmpp includes from a sibling pkix dep in one place;
          # fetch it too so includes resolve.
          git clone --depth 1 https://github.com/processone/pkix.git \
            ejabberd/_build/default/lib/pkix

      - name: Compile module
        run: |
          mkdir -p /tmp/ebin
          output=$(erlc \
            -I ejabberd/include \
            -I ejabberd/_build/default/lib \
            -I ejabberd \
            -Wall \
            -o /tmp/ebin \
            src/mod_signup_keyword.erl 2>&1) || true
          echo "$output"
          test -f /tmp/ebin/mod_signup_keyword.beam || { echo "FAIL: no beam produced"; exit 1; }
          # Filter the expected gen_mod warning, then fail on any remaining error.
          errors=$(echo "$output" | grep -vE "behaviour gen_mod undefined" | grep -E "error:" || true)
          if [ -n "$errors" ]; then
            echo "FAIL: compile errors:"
            echo "$errors"
            exit 1
          fi
          echo "OK: compiled with no errors"
