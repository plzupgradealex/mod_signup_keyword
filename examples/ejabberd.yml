## Example: minimal ejabberd.yml snippet showing mod_signup_keyword
##
## This is NOT a complete config — it shows only the registration-related
## pieces. Drop these into your existing ejabberd.yml.
##
## IMPORTANT: do NOT also load mod_register. This module owns the
## jabber:iq:register IQ namespace.

## Per-IP rate limit on registration attempts (seconds).
## 600 = one attempt per 10 minutes per source IP. Strongly recommended.
registration_timeout: 600

modules:
  # ... your other modules (mod_roster, mod_ping, etc.) ...

  ## Keyword-gated IBR. The keyword is a SECRET — set it on the server,
  ## never commit the real value to version control.
  mod_signup_keyword:
    keyword: "CHANGE_ME_TO_YOUR_REAL_KEYWORD"

    ## Message sent to users right after they register. Empty to disable.
    welcome_message: "Welcome! Your account is ready."

    ## Usernames that can't be registered even with the correct keyword.
    ## Prevents someone from grabbing "admin" etc.
    reserved_users:
      - admin
      - administrator
      - root
      - support
      - info
      - postmaster
      - system
      - host
      - server
      - register
      - bot

    ## Instructions shown in the registration form. Defaults to a sensible
    ## string if omitted.
    instructions: "Enter your chosen username, password, and the signup keyword you were given."
